# ============================================
# Render Blueprint 配置
# 在 Render Dashboard 创建 Blueprint 时会自动读取此文件
# ============================================

services:
  - type: web
    name: animerch-api
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/health
