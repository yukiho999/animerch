name: Scheduled Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx pymysql pyyaml sqlalchemy

      - name: Debug check
        run: |
          echo "=== PYTHONPATH=$PYTHONPATH ==="
          python -c "import backend; print('backend ok')"
          python -c "from backend.models import Base; print('models ok')"
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run crawler
        env:
          WEIBO_COOKIE: ${{ secrets.WEIBO_COOKIE }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: python -u backend/crawler/weibo_spider_cloud.py
