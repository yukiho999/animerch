name: Trigger Cloud Crawl

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render crawl
        run: |
          curl -X POST https://animerch-backend.onrender.com/api/admin/crawl/trigger
          echo ""
          echo "Crawl triggered on Render"
